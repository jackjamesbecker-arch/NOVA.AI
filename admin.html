<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NOVA — APEX COMMAND</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cyan:#00e5ff;--cyan2:#0097a7;--bg:#030d10;--bg2:#05181e;
  --panel:#0a2830;--panel2:#0d3340;--text:#c8f5fc;--text2:#6bb5c5;
  --text3:#3d7a8a;--green:#00ff88;--red:#ff4444;--amber:#ffaa00;
  --border:rgba(0,229,255,0.15);--border2:rgba(0,229,255,0.35);
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

.admin-wrap{width:100%;max-width:560px;position:relative;z-index:1}
.admin-header{text-align:center;margin-bottom:32px}
.admin-logo{font-size:32px;font-weight:700;letter-spacing:10px;color:var(--cyan);margin-bottom:4px}
.admin-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:4px}

.panel{background:var(--panel);border:1px solid var(--border2);padding:28px;position:relative;margin-bottom:20px}
.panel::before,.panel::after{content:'';position:absolute;width:12px;height:12px;border-color:var(--cyan);border-style:solid}
.panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.panel::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.panel-title{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan2);letter-spacing:3px;margin-bottom:20px}

.field{margin-bottom:16px}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:10px 14px;outline:none;transition:border 0.2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--bg2);color:var(--text)}

.btn{width:100%;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;padding:12px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;margin-top:4px}
.btn:hover{background:rgba(0,229,255,0.08);box-shadow:0 0 16px rgba(0,229,255,0.15)}
.btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}

.result-box{display:none;margin-top:20px;border:1px solid var(--green);padding:20px;background:rgba(0,255,136,0.04);text-align:center}
.result-key{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--green);letter-spacing:4px;margin:8px 0}
.result-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:3px}
.result-tier{font-size:12px;color:var(--text2);margin-top:6px;letter-spacing:2px}
.copy-btn{margin-top:14px;background:transparent;border:1px solid var(--green);color:var(--green);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;padding:8px 20px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.copy-btn:hover{background:rgba(0,255,136,0.08)}

.err-box{display:none;margin-top:16px;border:1px solid rgba(255,68,68,0.4);padding:12px 16px;background:rgba(255,68,68,0.06);font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:1px;text-align:center}

.log-panel{background:var(--panel);border:1px solid var(--border);padding:20px;position:relative}
.log-panel-title{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan2);letter-spacing:3px;margin-bottom:14px}
.log-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:3px}
.log-list::-webkit-scrollbar-thumb{background:var(--border)}
.log-item{border:1px solid var(--border);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.log-key{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text)}
.log-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);text-align:right;line-height:1.6}
.log-tier-badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;letter-spacing:1px}
.log-tier-badge.RECRUIT{background:rgba(58,117,133,0.2);color:var(--text2)}
.log-tier-badge.AGENT{background:rgba(0,229,255,0.1);color:var(--cyan)}
.log-tier-badge.COMMANDER{background:rgba(255,170,0,0.1);color:var(--amber)}
.log-empty{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);text-align:center;padding:16px 0}

/* auth screen */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#auth-screen.gone{display:none}
.auth-logo{font-size:28px;font-weight:700;letter-spacing:8px;color:var(--cyan)}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:3px}
.auth-input{background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;padding:12px 20px;outline:none;text-align:center;letter-spacing:4px;width:280px}
.auth-input:focus{border-color:var(--cyan)}
.auth-err{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--red);height:16px;text-align:center}
.auth-btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;padding:10px 32px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.auth-btn:hover{background:rgba(0,229,255,0.08)}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-screen">
  <div class="auth-logo">NOVA</div>
  <div class="auth-sub">APEX COMMAND · RESTRICTED ACCESS</div>
  <input class="auth-input" id="admin-pass" type="password" placeholder="ADMIN SECRET" maxlength="32" autocomplete="off"/>
  <div class="auth-err" id="auth-err"></div>
  <button class="auth-btn" id="auth-btn">AUTHENTICATE</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap">
  <div class="admin-header">
    <div class="admin-logo">APEX COMMAND</div>
    <div class="admin-sub">NOVA QC-7 · KEY MANAGEMENT SYSTEM</div>
  </div>

  <div class="panel">
    <div class="panel-title">// GENERATE ACCESS KEY</div>
    <div class="field">
      <div class="field-label">OPERATOR EMAIL</div>
      <input type="email" id="op-email" placeholder="operator@email.com"/>
    </div>
    <div class="field">
      <div class="field-label">OPERATOR NAME / CALLSIGN</div>
      <input type="text" id="op-name" placeholder="e.g. Jack or GHOST-7" maxlength="32"/>
    </div>
    <div class="field">
      <div class="field-label">CLEARANCE TIER</div>
      <select id="op-tier">
        <option value="RECRUIT">RECRUIT — Standard + Tactical</option>
        <option value="AGENT">AGENT — All 6 Modes</option>
        <option value="COMMANDER">COMMANDER — Full Access</option>
      </select>
    </div>
    <button class="btn" id="gen-btn">⚡ GENERATE KEY</button>

    <div class="result-box" id="result-box">
      <div class="result-label">ACCESS KEY GENERATED</div>
      <div class="result-key" id="result-key">—</div>
      <div class="result-tier" id="result-tier">—</div>
      <button class="copy-btn" id="copy-btn">COPY KEY</button>
    </div>
    <div class="err-box" id="err-box">ERROR GENERATING KEY</div>
  </div>

  <div class="log-panel">
    <div class="log-panel-title">// RECENTLY GENERATED KEYS</div>
    <div class="log-list" id="log-list">
      <div class="log-empty">No keys generated this session.</div>
    </div>
  </div>
</div>

<script>
let adminSecret = '';
const sessionLog = [];

// ── AUTH ──
document.getElementById('auth-btn').onclick = authenticate;
document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });

async function authenticate() {
  const pass = document.getElementById('admin-pass').value.trim();
  if (!pass) return;
  // test against API
  const res = await fetch('/api/generate-key', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tier: 'RECRUIT', email: 'test', adminSecret: pass })
  });
  if (res.status === 401) {
    document.getElementById('auth-err').textContent = '⚠ INVALID SECRET';
    return;
  }
  adminSecret = pass;
  document.getElementById('auth-screen').classList.add('gone');
}

// ── GENERATE ──
document.getElementById('gen-btn').onclick = async () => {
  const email = document.getElementById('op-email').value.trim();
  const name  = document.getElementById('op-name').value.trim();
  const tier  = document.getElementById('op-tier').value;
  const btn   = document.getElementById('gen-btn');
  const resultBox = document.getElementById('result-box');
  const errBox    = document.getElementById('err-box');

  if (!email) { document.getElementById('op-email').focus(); return; }
  if (!name)  { document.getElementById('op-name').focus(); return; }

  btn.textContent = 'GENERATING...';
  btn.disabled = true;
  resultBox.style.display = 'none';
  errBox.style.display = 'none';

  try {
    const res = await fetch('/api/generate-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tier, email, name, adminSecret })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    const key = data.key;
    document.getElementById('result-key').textContent = key;
    document.getElementById('result-tier').textContent = tier + ' · ' + name + ' · ' + email;
    resultBox.style.display = 'block';

    sessionLog.unshift({ key, tier, email, name, time: new Date().toLocaleTimeString() });
    renderLog();
  } catch (e) {
    errBox.textContent = '⚠ ' + (e.message || 'Error generating key');
    errBox.style.display = 'block';
  }

  btn.textContent = '⚡ GENERATE KEY';
  btn.disabled = false;
};

// copy
document.getElementById('copy-btn').onclick = () => {
  const key = document.getElementById('result-key').textContent;
  navigator.clipboard.writeText(key).then(() => {
    document.getElementById('copy-btn').textContent = '✓ COPIED';
    setTimeout(() => document.getElementById('copy-btn').textContent = 'COPY KEY', 1500);
  });
};

// ── LOG ──
function renderLog() {
  const list = document.getElementById('log-list');
  if (!sessionLog.length) { list.innerHTML = '<div class="log-empty">No keys generated this session.</div>'; return; }
  list.innerHTML = sessionLog.map(e => `
    <div class="log-item">
      <div>
        <div class="log-key">${e.key}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);margin-top:3px">${e.name} · ${e.email}</div>
      </div>
      <div style="text-align:right">
        <div class="log-tier-badge ${e.tier}">${e.tier}</div>
        <div class="log-meta" style="margin-top:4px">${e.time}</div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
