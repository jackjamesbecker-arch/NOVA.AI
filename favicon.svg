<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#030d10" rx="18"/>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.8; } 50% { opacity: 0.3; } }
    .r1 { transform-origin: 50px 50px; animation: spin 12s linear infinite; }
    .r2 { transform-origin: 50px 50px; animation: spin 8s linear infinite reverse; }
    .g { animation: pulse 3s ease-in-out infinite; }
  </style>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.15"/>
  <g class="r1">
    <circle cx="50" cy="50" r="32" fill="none" stroke="#00e5ff" stroke-width="0.6" stroke-dasharray="3 5" opacity="0.4"/>
  </g>
  <g class="r2">
    <circle cx="50" cy="50" r="26" fill="none" stroke="#00e5ff" stroke-width="0.4" stroke-dasharray="2 6" opacity="0.25"/>
  </g>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.7"/>
  <circle cx="50" cy="50" r="12" fill="#00e5ff" opacity="0.08"/>
  <circle cx="50" cy="50" r="8" fill="#00e5ff" opacity="0.15" class="g"/>
  <circle cx="50" cy="50" r="5" fill="#00e5ff" opacity="0.5" class="g"/>
  <circle cx="50" cy="50" r="2.5" fill="#00e5ff" opacity="0.95"/>
</svg>
